name: Build Gestor360 APK (Cliente - Admin/Vendedor)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Crear .env con credenciales de Supabase (desde GitHub Secrets)
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}" >> .env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17 (requerido por el plugin de Gradle de Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias del sistema requeridas por Buildozer
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev automake build-essential

      - name: Instalar Buildozer y Cython
        run: |
          pip3 install --upgrade buildozer legacy-cgi setuptools Cython==0.29.34 virtualenv

      - name: Compilar APK (modo verbose para ver cualquier error con detalle)
        run: |
          export PATH=$PATH:~/.local/bin/
          yes | buildozer -v android debug

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: gestor360-apk
          path: ./bin/*.apk
          
